<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SmartFinance AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

  <div class="bg-white p-8 rounded-2xl shadow text-center">
    <h1 class="text-3xl font-bold mb-4">💼 SmartFinance AI</h1>
    <p class="text-gray-600 mb-6">Upload your CSV file</p>

    <form action="{{ url_for('upload') }}" method="POST" enctype="multipart/form-data">
      <input type="file" name="file" required class="mb-4 border p-2 rounded"><br>
      <button class="bg-blue-600 text-white px-6 py-2 rounded-xl">
        Analyze Data
      </button>
    </form>

  </div>

</body>
</html>
